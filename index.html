<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fever-proto-craft</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <meta property="og:title" content="fever-proto-craft" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Hide Lovable badge with CSS -->
    <style>
      /* Hide Lovable badge completely */
      #lovable-badge,
      #lovable-badge-close,
      a[href*="lovable.dev"],
      a[href*="lovable.dev/projects"],
      [id*="lovable"],
      [class*="lovable"],
      a[target="_blank"][href*="lovable"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        position: absolute !important;
        left: -9999px !important;
        top: -9999px !important;
        width: 0 !important;
        height: 0 !important;
        z-index: -1 !important;
      }
      
      /* Also hide by content */
      a[href*="utm_source=lovable-badge"] {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove Lovable badge if injected by hosting platform -->
    <script>
      // Aggressive badge removal function
      function removeLovableBadge() {
        // Remove by ID
        const badge = document.getElementById('lovable-badge');
        if (badge) {
          badge.remove();
        }
        
        // Remove by href containing lovable.dev
        const lovableLinks = document.querySelectorAll('a[href*="lovable.dev"]');
        lovableLinks.forEach(link => link.remove());
        
        // Remove any element with lovable in id or class
        const lovableElements = document.querySelectorAll('[id*="lovable"], [class*="lovable"]');
        lovableElements.forEach(el => el.remove());
      }
      
      // Remove immediately and repeatedly
      removeLovableBadge();
      
      // Remove every 100ms for the first 5 seconds
      let attempts = 0;
      const aggressiveRemoval = setInterval(() => {
        removeLovableBadge();
        attempts++;
        if (attempts > 50) { // Stop after 5 seconds
          clearInterval(aggressiveRemoval);
        }
      }, 100);
      
      // Watch for dynamically added elements
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.nodeType === 1) { // Element node
              if (node.id === 'lovable-badge' || 
                  node.querySelector && node.querySelector('#lovable-badge') ||
                  (node.href && node.href.includes('lovable.dev'))) {
                setTimeout(removeLovableBadge, 0);
              }
            }
          });
        });
      });
      
      // Start observing
      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
      
      // Also remove on DOM content loaded and window load
      document.addEventListener('DOMContentLoaded', removeLovableBadge);
      window.addEventListener('load', removeLovableBadge);
      
      // Cleanup on page unload
      window.addEventListener('beforeunload', () => {
        clearInterval(aggressiveRemoval);
        observer.disconnect();
      });
    </script>
  </body>
</html>
